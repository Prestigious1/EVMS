{% extends "hall/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card app-card">
      <div class="card-body p-4">
        <h1 class="h4 mb-2">Contact Us</h1>
        <div class="text-body-secondary mb-3">Have a question? Send us a message.</div>
        <form method="post" class="row g-3">
          {% csrf_token %}
          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input class="form-control" name="name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="col-12">
            <label class="form-label">Subject</label>
            <input class="form-control" name="subject" required>
          </div>
          <div class="col-12">
            <label class="form-label">Message</label>
            <textarea class="form-control rich-editor" rows="5" name="message" required></textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-success" type="submit">Send message</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

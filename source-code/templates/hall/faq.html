{% extends "hall/base.html" %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-4">
  <div>
    <h1 class="h4 mb-1"><i class="bi bi-question-circle me-2 text-primary"></i>Frequently Asked Questions</h1>
    <div class="text-body-secondary">Everything you need to know about booking halls at LASU.</div>
  </div>
  <a href="{% url 'hall:contact' %}" class="btn btn-outline-primary btn-sm">
    <i class="bi bi-envelope me-1"></i>Still have questions? Contact us
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-xl-9">
    <div class="accordion" id="faqAccordion">
      {% for f in faqs %}
        <div class="accordion-item app-card mb-2 border-0">
          <h2 class="accordion-header" id="heading{{ f.id }}">
            <button class="accordion-button collapsed rounded-3 fw-semibold" type="button"
                    data-bs-toggle="collapse" data-bs-target="#faq{{ f.id }}"
                    aria-expanded="false" aria-controls="faq{{ f.id }}">
              <i class="bi bi-patch-question text-primary me-2"></i>
              {{ f.question }}
            </button>
          </h2>
          <div id="faq{{ f.id }}" class="accordion-collapse collapse"
               aria-labelledby="heading{{ f.id }}" data-bs-parent="#faqAccordion">
            <div class="accordion-body text-body-secondary">
              {{ f.answer|safe }}
            </div>
          </div>
        </div>
      {% empty %}
        <div class="card app-card text-center py-5">
          <div class="card-body">
            <i class="bi bi-question-circle fs-1 text-body-secondary opacity-50"></i>
            <div class="mt-3 text-body-secondary">No FAQs have been published yet.</div>
            <a href="{% url 'hall:contact' %}" class="btn btn-outline-primary btn-sm mt-3">
              <i class="bi bi-envelope me-1"></i>Ask us directly
            </a>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}

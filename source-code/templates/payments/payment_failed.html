{% extends "hall/base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card app-card border-danger border-opacity-50">
        <div class="card-body p-4 text-center">
          <div class="display-4 text-danger mb-2"><i class="bi bi-x-octagon-fill"></i></div>
          <h1 class="h4 mb-2">Payment not completed</h1>
          <p class="text-body-secondary mb-3">{{ reason|default:"We could not confirm this payment." }}</p>
          {% if payment and payment.reservation %}
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center flex-wrap">
              <a class="btn btn-success" href="{% url 'payments:start_reservation_payment' payment.reservation.booking_reference %}">
                <i class="bi bi-arrow-repeat"></i> Try payment again
              </a>
              <a class="btn btn-outline-secondary" href="{% url 'reservations:my_reservations' %}">My reservations</a>
            </div>
          {% elif payment %}
            <a class="btn btn-outline-secondary" href="{% url 'payments:my_payments' %}">My payments</a>
          {% else %}
            <a class="btn btn-outline-secondary" href="{% url 'hall:home' %}">Home</a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
{% endblock %}

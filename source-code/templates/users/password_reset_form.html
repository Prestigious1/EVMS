{% extends "hall/base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card app-card">
        <div class="card-body p-4">
          <h1 class="h4 mb-1">Reset your password</h1>
          <div class="text-body-secondary mb-3">Enter your email to receive a reset link.</div>
          <form method="post" class="vstack gap-3">
            {% csrf_token %}
            <div class="app-card p-3 bg-body-tertiary">
              {{ form.as_p }}
            </div>
            <button class="btn btn-success btn-lg" type="submit"><i class="bi bi-envelope"></i> Send reset link</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
